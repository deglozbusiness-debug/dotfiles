# Extra autostart processes
# exec-once = uwsm-app -- my-service
exec-once = waybar

# Dock estilo macOS = Cairo-Dock (zoom-on-hover con magnificacion de
# vecinos = el efecto "abanico" de macOS). Corre nativo en Wayland.
#   -o : backend OpenGL (animaciones suaves)
#   -L : forzar backends Wayland
#   -a : mantener el dock por encima de las ventanas
#   -t : transparency-workaround = mitiga glitches al abrir dialogos/subdocks
#        y el menu de clic derecho bajo Wayland (layer-shell)
#   -d : config dir = ~/.config/cairo-dock-dp1 (num_screen=1 → DP-1, primario)
# Solo una instancia en el monitor principal (DP-1). La config legacy en
# ~/.config/cairo-dock/ (num_screen=0 → HDMI-A-1) se conserva como fuente
# de launchers via symlink y por si quieres revertir a dual-dock.
exec-once = cairo-dock -o -L -a -t -d /home/deglozdev/.config/cairo-dock-dp1

# Puente "minimizar": Hyprland no minimiza nativo; este daemon escucha el evento
# `minimized` que Cairo-Dock emite via wlr-foreign-toplevel-management y manda
# la ventana a su propio workspace especial oculto (special:min-<dir>),
# restaurandola al volver a clickear su icono en el dock.
# Tambien sirve a los atajos Super+H (hide-focused) / Super+Shift+H (restore-all).
exec-once = ~/.config/hypr/scripts/minimize-bridge.sh

# Cargar los plugins de hyprpm (hyprexpo) al iniciar la sesion. -n = sin notificacion.
exec-once = hyprpm reload -n

# Cursor Aurora (Bibata-Modern-Ice, acento cyan). gsettings lo fija para apps
# GTK; esto lo fija para el cursor del propio compositor Hyprland en cada login.
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
