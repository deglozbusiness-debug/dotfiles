# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, uwsm-app -- thorium-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, uwsm-app -- thorium-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Logitech MX Keys
 bindd = SUPER SHIFT, S, Screenshot (area), exec, omarchy-capture-screenshot region   # Print Screen Button
# bind = SUPER, H, exec, voxtype record toggle                 # Dictation Button
# bind = SUPER, PERIOD, exec, omarchy-launch-walker -m symbols # Emoji Button
unbind = SUPER, W
bindd = SUPER, W, Do nothing, pass
bindd = SUPER, Q, Close window, killactive,

# Minimizar (Hyprland no minimiza nativo -> lo gestiona minimize-bridge.sh, que
# manda cada ventana a su propio workspace especial oculto y la trae de vuelta).
#   Super+H        -> minimiza la ventana enfocada
#   Super+Shift+H  -> restaura TODAS las ventanas minimizadas
# (Tambien: clic en el icono del dock de una app abierta la minimiza/restaura —
#  Cairo-Dock tiene "minimize on click" activado y el daemon traduce el pedido.)
bindd = SUPER, H, Minimizar ventana, exec, ~/.config/hypr/scripts/minimize-bridge.sh hide-focused
bindd = SUPER SHIFT, H, Restaurar minimizadas, exec, ~/.config/hypr/scripts/minimize-bridge.sh restore-all

# ── FASE 6: vista "Mission Control" (hyprexpo) ──
# Super+`  y  Super+Tab abren el overview de workspaces (clic en un tile
# para ir, o Esc para cerrar). Ambas teclas usan hyprexpo.
#
# Nota (mayo 2026): hyprspace (el Expose tipo macOS) NO compila contra
# Hyprland 0.55 (su codigo aun usa la API vieja). Y hyprexpo fue retirado
# del repo oficial hyprland-plugins ("drop unmaintained plugins"), asi que
# se recompilo a mano desde el ultimo commit que aun lo incluia y se
# instalo en el cache de hyprpm. Copia del .so: ~/dotfiles/backup/hyprexpo-0.55-eaf18d5.so
# ⚠ Si corres `hyprpm update`, hyprexpo desaparece otra vez -> reinstalar el .so.
# (unbind: Super+Tab era "siguiente workspace" en omarchy.)
unbind = SUPER, TAB
bindd = SUPER, grave, Overview workspaces, hyprexpo:expo, toggle
bindd = SUPER, TAB, Overview workspaces, hyprexpo:expo, toggle

# ─────────────────────────────────────────────────────────────────────
# FASE 10 — Apps y atajos extra (Aurora Twilight)
# Patron: omarchy-launch-or-focus <clase-ventana> "<comando>" -> si la app
# ya esta abierta la enfoca; si no, la lanza. uwsm-app -- arranca la app
# dentro del session manager de Omarchy (recursos/cgroups bien puestos).
# ─────────────────────────────────────────────────────────────────────

# Lanzadores de apps (teclas Super+letra que estaban libres)
bindd = SUPER, B, Browser (Thorium), exec, omarchy-launch-or-focus "Thorium-browser" "uwsm-app -- thorium-browser"
bindd = SUPER, E, File manager (Nautilus), exec, omarchy-launch-or-focus "org.gnome.Nautilus" "uwsm-app -- nautilus"
bindd = SUPER, N, Typora, exec, omarchy-launch-or-focus "[Tt]ypora" "uwsm-app -- typora --enable-wayland-ime"
bindd = SUPER, A, Claude Desktop, exec, omarchy-launch-or-focus "^claude$" "uwsm-app -- claude-desktop"

# VS Code en Super+Shift+C (pisa el atajo "Calendar" webapp que tenias ahi)
unbind = SUPER SHIFT, C
bindd = SUPER SHIFT, C, VS Code, exec, omarchy-launch-or-focus "code-oss" "uwsm-app -- code-oss"

# Bloquear pantalla en Super+X (pisa "cortar universal" de Omarchy; Ctrl+X
# sigue funcionando normal). OMARCHY_LOCK_ONLY=true => solo lanza hyprlock,
# NO apaga los monitores (dpms off no los re-despertaba bien). hypridle igual
# apaga la pantalla tras ~152s de inactividad, con on-resume = omarchy-system-wake.
unbind = SUPER, X
bindd = SUPER, X, Lock screen, exec, OMARCHY_LOCK_ONLY=true omarchy-system-lock

# Recargar la config de Hyprland (tecla que estaba libre/comentada)
bindd = SUPER SHIFT, R, Reload Hyprland, exec, hyprctl reload

# ─────────────────────────────────────────────────────────────────────
# Dock: pinear apps. Click derecho sobre un icono ya pinneado en
# Cairo-Dock -> "Remove this launcher" (nativo del dock) para quitar.
# Super+Alt+D abre un picker con todas las apps instaladas; al elegir,
# la pinea en ambas instancias del dock (HDMI + DP-1).
# ─────────────────────────────────────────────────────────────────────
bindd = SUPER ALT, D, Add app to dock, exec, ~/.config/hypr/scripts/dock-add-app.sh
bindd = SUPER ALT, R, Refresh dock,     exec, ~/.config/hypr/scripts/dock-refresh.sh
