# Change the default Omarchy look'n'feel

# ── Aurora Twilight: blur REAL (frosted glass) en waybar y dock ──
# blur on            -> Hyprland difumina lo que hay DETRAS de esa capa
#                       (el efecto cristal de verdad, no solo transparencia)
# ignore_alpha 0.2   -> los pixeles casi transparentes (alpha < 0.2) NO se
#                       difuminan, asi los huecos vacios de la waybar no
#                       muestran un rectangulo borroso feo.
# "cairo-dock" y "waybar" son los "namespace" de cada capa (layer-shell);
# se ven con `hyprctl layers`. Sintaxis 0.55: "regla valor, match:namespace nombre".
layerrule = blur on, match:namespace cairo-dock
layerrule = ignore_alpha 0.2, match:namespace cairo-dock
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace waybar
# Notificaciones (mako): mismo efecto frosted glass. ignore_alpha algo mas
# alto para que las esquinas redondeadas (alpha 0) no salgan como rectangulo borroso.
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.55, match:namespace notifications
# Walker (app launcher, FASE 13): el cuadro flota centrado con fondo
# semitransparente (alpha 0.72) -> Hyprland difumina el escritorio detras.
# ignore_alpha 0.4 deja sin difuminar el area transparente alrededor del cuadro.
layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 0.4, match:namespace walker

# ── FASE 5: opacidad de ventanas ──
# omarchy ya etiqueta todas las ventanas con "default-opacity" y les pone
# opacidad 0.97/0.9. Lo pisamos (esta regla viene despues -> gana) con
# 0.95 activa / 0.85 inactiva.
windowrule = opacity 0.95 0.85, match:tag default-opacity
# Alacritty: SIN atenuacion de Hyprland (opacity 1 1). La transparencia de
# la terminal la hace ella misma (window.opacity = 0.88 en alacritty.toml),
# que deja el texto opaco; Hyprland solo se encarga del blur de detras.
# Si pusieramos < 1 aqui, se sumaria al 0.88 y el texto saldria turbio.
windowrule = opacity 1 1, match:class Alacritty

# Claude Desktop (Electron) corre con --enable-transparent-visuals, que deja
# canal alpha activo en la ventana. Con la regla global de 0.95/0.85 Hyprland
# bluereaba TODO el fondo detras de Claude en cada frame -> input lag notable
# al entrar en la app. Forzamos opacity 1.0 + noblur SOLO para Claude para
# que el GPU no haga ese trabajo. La ventana cubre pantalla entera, no se ve
# "a traves" igual.
windowrule = opacity 1 1, match:class claude
windowrule = opaque on,   match:class claude

# https://wiki.hypr.land/Configuring/Basics/Variables/#general
general {
    # No gaps between windows or borders
    # gaps_in = 0
    # gaps_out = 0
    # border_size = 0

    # Change to niri-like side-scrolling layout
    # layout = scrolling
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#decoration
decoration {
    # ── FASE 5: esquinas redondeadas + opacidad global + sombras ──
    rounding = 12
    rounding_power = 2

    # Opacidad por defecto (las windowrules de arriba la afinan por app).
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    # Dim unfocused windows (0.0 = no dim, 1.0 = fully dimmed)
    # dim_inactive = true
    # dim_strength = 0.15

    # ── Aurora Twilight: blur "frosted glass" tipo macOS ──
    # passes 2 (no 3) — la Vega 8 integrada con 2 monitores @ 144/180Hz +
    # 5 capas blureadas (waybar, 2x cairo-dock, walker, notifications)
    # llegaba al limite del frame budget y generaba input lag uniforme.
    # macOS usa 2 passes y se ve casi igual; ahorra ~33% del costo GPU.
    # popups=false -> no blureamos popups/dialogs (menus contextuales,
    # tooltips, settings de apps Electron). Eran caros y los popups suelen
    # ser opacos por dentro asi que el cambio visual es minimo.
    blur {
        enabled = true
        size = 8
        passes = 2
        noise = 0.012
        contrast = 1.2
        brightness = 1.0
        vibrancy = 0.25
        vibrancy_darkness = 0.0
        popups = false
    }

    # ── Drop shadow con tinte morado (Aurora Twilight) ──
    shadow {
        enabled = true
        range = 28
        render_power = 3
        sharp = false
        color = rgba(20063aee)          # morado profundo, ventana activa
        color_inactive = rgba(0a0a18cc) # mas oscuro/neutro para inactivas
        offset = 0 6
        scale = 1.0
    }
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#animations
animations {
    enabled = yes

    # Curvas bezier propias (suaves, tipo macOS):
    #   auroraIn  -> ease-out expo: arranca rapido, frena suave (aparecer)
    #   auroraOut -> ease-in: arranca lento, acelera (desaparecer)
    #   auroraWS  -> ease-in-out: para cambios de workspace
    #   auroraPop -> con un leve "overshoot" al final (rebote sutil)
    bezier = auroraIn,  0.16, 1.00, 0.30, 1.00
    bezier = auroraOut, 0.70, 0.00, 0.84, 0.00
    bezier = auroraWS,  0.65, 0.00, 0.35, 1.00
    bezier = auroraPop, 0.20, 0.95, 0.20, 1.05

    # animation = NOMBRE, ON/OFF, VELOCIDAD(*100ms), CURVA, [ESTILO]
    # Velocidades bajadas (5-6 -> 3-4) para feel mas snappy. Las curvas
    # siguen siendo suaves; solo se acorta la duracion total ~200ms por
    # animacion. border/borderangle no afectan al delay percibido (no
    # bloquean al usuario), los dejamos como estaban.
    animation = windows,        1, 3, auroraPop, popin 92%
    animation = windowsIn,      1, 3, auroraPop, popin 92%
    animation = windowsOut,     1, 3, auroraOut, popin 92%
    animation = windowsMove,    1, 3, auroraIn
    animation = fade,           1, 3, auroraIn
    animation = fadeIn,         1, 3, auroraIn
    animation = fadeOut,        1, 3, auroraOut
    animation = fadeDim,        1, 3, auroraIn
    animation = border,         1, 8, auroraIn
    animation = borderangle,    1, 30, auroraIn
    animation = workspaces,     1, 4, auroraWS, slide
    animation = specialWorkspace, 1, 4, auroraWS, slidevert
    animation = layers,         1, 3, auroraIn, fade
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

# https://wiki.hypr.land/Configuring/Layouts/Scrolling-Layout/
scrolling {
    # See only one column per screen instead of two
    # column_width = 0.97
}

# ── FASE 6: config del plugin hyprexpo (vista "Mission Control") ──
# Se carga via `hyprpm reload` (ver autostart.conf). Si el plugin aun
# no esta cargado al parsear esto, Hyprland lo ignora sin romper nada.
plugin {
    hyprexpo {
        columns = 3
        gap_size = 10
        bg_col = rgb(1a1b3a)        # Aurora Twilight base (indigo profundo)
        workspace_method = first 1  # 1er tile = workspace actual
        gesture_distance = 300      # distancia "max" del swipe en el touchpad
        skip_empty = false          # mostrar tambien los workspaces vacios
    }
}

# ── Gesto de touchpad para hyprexpo: deshabilitado ──
# La version actual de hyprexpo (API nueva de gestos de Hyprland) ya NO usa
# enable_gesture / gesture_fingers / gesture_positive; el gesto iria con el
# keyword `hyprexpo-gesture = ...` fuera del bloque plugin, pero como usas un
# teclado 60% externo (sin touchpad) no lo activamos. Se abre con SUPER+Tab o SUPER+`.
# Si algun dia quieres el swipe de 3 dedos en el portatil, descomenta y ajusta:
# hyprexpo-gesture = 3, swipe
