# ════════════════════════════════════════════════════════════════════
#  Aurora Twilight — Hyprlock (pantalla de bloqueo "premium")
#  - Las variables de color ($color, $inner_color, ...) vienen del tema
#    Omarchy activo (source de abajo). Aqui solo se define el LAYOUT.
#  - Reloj grande + fecha + caja de contrasena con borde magenta y
#    glassmorphism; el wallpaper Aurora se ve detras con blur fuerte.
# ════════════════════════════════════════════════════════════════════
source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
    hide_cursor = true
    immediate_render = true
}

animations {
    enabled = true
    bezier = auroraIn, 0.16, 1.00, 0.30, 1.00
    animation = fadeIn, 1, 4, auroraIn
    animation = inputFieldDots, 1, 2, auroraIn
}

# ── Fondo: el wallpaper Aurora, difuminado fuerte y un poco oscurecido
#    para que el texto resalte (frosted glass tipo macOS) ──
background {
    monitor =
    path = ~/.config/omarchy/current/background
    color = $color
    blur_passes = 4
    blur_size = 8
    noise = 0.012
    contrast = 1.1
    brightness = 0.55
    vibrancy = 0.20
    vibrancy_darkness = 0.0
}

# ── Reloj grande (HH:MM) ──
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_family = JetBrainsMono Nerd Font
    font_size = 96
    color = rgba(232, 232, 255, 1.0)
    halign = center
    valign = center
    position = 0, 220
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(8, 6, 26, 0.7)
}

# ── Fecha (Dia, DD de Mes) ──
label {
    monitor =
    text = cmd[update:60000] echo "$(LC_TIME=es_ES.UTF-8 date +'%A, %d de %B' 2>/dev/null || date +'%A, %d %B')"
    font_family = Inter
    font_size = 20
    color = rgba(184, 184, 255, 0.9)
    halign = center
    valign = center
    position = 0, 130
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(8, 6, 26, 0.6)
}

# ── Caja de contrasena ──
input-field {
    monitor =
    size = 420, 60
    position = 0, -30
    halign = center
    valign = center

    inner_color = rgba(26, 27, 58, 0.62)
    outer_color = rgba(255, 0, 110, 0.85)
    outline_thickness = 3
    rounding = 16

    font_family = Inter
    font_color = rgba(232, 232, 255, 1.0)
    placeholder_text = <i>  Contrasena...</i>

    check_color = rgba(0, 217, 255, 1.0)
    fail_color  = rgba(255, 61, 143, 1.0)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    dots_size = 0.28
    dots_spacing = 0.32
    dots_center = true

    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(8, 6, 26, 0.55)
    shadow_boost = 1.2

    fade_on_empty = false
    hide_input = false
}

# ── Usuario (debajo de la caja) ──
label {
    monitor =
    text =     $USER
    font_family = Inter
    font_size = 14
    color = rgba(184, 184, 255, 0.75)
    halign = center
    valign = center
    position = 0, -110
}

auth {
    fingerprint:enabled = false
}

source = ~/.local/state/omarchy/toggles/hyprlock.conf
