<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="folderBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(184,184,255,0.28)"/>
      <stop offset="1" stop-color="rgba(26,27,58,0.55)"/>
    </linearGradient>
    <linearGradient id="folderTab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(184,184,255,0.45)"/>
      <stop offset="1" stop-color="rgba(184,184,255,0.20)"/>
    </linearGradient>
    <linearGradient id="m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3385"/>
      <stop offset="1" stop-color="#ff006e"/>
    </linearGradient>
    <linearGradient id="c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#33e0ff"/>
      <stop offset="1" stop-color="#00d9ff"/>
    </linearGradient>
    <linearGradient id="l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c8c8ff"/>
      <stop offset="1" stop-color="#b8b8ff"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <path d="M 38 70
           L 38 60
           a 14 14 0 0 1 14 -14
           L 100 46
           a 10 10 0 0 1 8 4
           L 116 60
           L 204 60
           a 14 14 0 0 1 14 14
           L 218 78
           Z"
        fill="url(#folderTab)"
        stroke="rgba(184,184,255,0.35)" stroke-width="1.2"/>

  <rect x="32" y="72" width="192" height="148" rx="22" ry="22"
        fill="url(#folderBg)"
        stroke="rgba(184,184,255,0.45)" stroke-width="1.5"/>

  <rect x="36" y="76" width="184" height="64" rx="20" ry="20" fill="rgba(255,255,255,0.06)"/>

  <g filter="url(#soft)">
    <rect x="60"  y="100" width="36" height="36" rx="10" fill="url(#m)"/>
    <rect x="110" y="100" width="36" height="36" rx="10" fill="url(#c)"/>
    <rect x="160" y="100" width="36" height="36" rx="10" fill="url(#l)"/>

    <rect x="60"  y="148" width="36" height="36" rx="10" fill="url(#c)"/>
    <rect x="110" y="148" width="36" height="36" rx="10" fill="url(#l)"/>
    <rect x="160" y="148" width="36" height="36" rx="10" fill="url(#m)"/>
  </g>
</svg>
