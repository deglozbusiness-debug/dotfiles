<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1b3a"/>
      <stop offset="1" stop-color="#0f1028"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3385"/>
      <stop offset="1" stop-color="#ff006e"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#33e0ff"/>
      <stop offset="1" stop-color="#00d9ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="52" ry="52" fill="url(#bg)"
        stroke="rgba(184,184,255,0.25)" stroke-width="1.5"/>

  <rect x="8" y="8" width="240" height="120" rx="52" ry="52" fill="rgba(255,255,255,0.04)"/>

  <g filter="url(#glow)">
    <rect x="44"  y="44"  width="48" height="48" rx="14" fill="url(#magenta)"/>
    <rect x="104" y="44"  width="48" height="48" rx="14" fill="url(#cyan)"/>
    <rect x="164" y="44"  width="48" height="48" rx="14" fill="url(#magenta)"/>

    <rect x="44"  y="104" width="48" height="48" rx="14" fill="url(#cyan)"/>
    <rect x="104" y="104" width="48" height="48" rx="14" fill="url(#magenta)"/>
    <rect x="164" y="104" width="48" height="48" rx="14" fill="url(#cyan)"/>

    <rect x="44"  y="164" width="48" height="48" rx="14" fill="url(#magenta)"/>
    <rect x="104" y="164" width="48" height="48" rx="14" fill="url(#cyan)"/>
    <rect x="164" y="164" width="48" height="48" rx="14" fill="url(#magenta)"/>
  </g>
</svg>
